<div class="container">
  <h1>Mes Tâches</h1>
  
  <div class="input-box">
    <input 
      [(ngModel)]="newTask" 
      (keyup.enter)="addTask()" 
      placeholder="Nouvelle tâche..."
      type="text"
    >
    <button class="btn-add" (click)="addTask()">Ajouter</button>
  </div>

  <ul>
    <li *ngFor="let task of tasks; let i = index">
      <span class="task-text">{{ task }}</span>
      <button class="btn-delete" (click)="deleteTask(i)">Supprimer</button>
    </li>
  </ul>

  <p *ngIf="tasks.length === 0" style="text-align: center; color: #86868b; font-size: 14px;">
    Aucune tâche pour le moment.
  </p>
</div>
